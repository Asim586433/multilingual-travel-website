        .next-steps li { margin-bottom: 0.5rem; padding-left: 1.5rem; position: relative; }
        .next-steps li::before { content: "✓"; color: #28a745; position: absolute; left: 0; }
        .action-buttons { display: flex; gap: 1rem; justify-content: center; margin-top: 3rem; }
        @media (max-width: 768px) {
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
