<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tours - Global Travels</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <!-- Same header as index.html -->
        <nav class="nav">
            <a href="/" class="logo">🌍 GlobalTravels</a>
            <div class="nav-menu">
                <a href="/tours.html" class="nav-link active">Tours</a>
                <a href="/#destinations" class="nav-link">Destinations</a>
                <a href="/#about" class="nav-link">About</a>
                <a href="/#contact" class="nav-link">Contact</a>
                <a href="/cart.html" class="cart-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24">
                        <circle cx="9" cy="21" r="2" fill="currentColor"/>
                        <circle cx="20" cy="21" r="2" fill="currentColor"/>
                        <path d="M1 1h4l2.5 13h13L23 6H6" stroke="currentColor" fill="none" stroke-width="2"/>
                    </svg>
                    <span class="cart-count" id="cartCount">0</span>
                </a>
            </div>
        </nav>
    </header>

    <main class="tours-page">
        <div class="page-header">
            <div class="container">
                <h1>All Tours</h1>
                <p>Find your perfect adventure from our curated collection</p>
            </div>
        </div>

        <div class="container">
            <div class="tours-layout">
                <!-- Filters Sidebar -->
                <aside class="filters-sidebar">
                    <h3>Filters</h3>
                    
                    <div class="filter-group">
                        <h4>Price Range</h4>
                        <div class="price-range">
                            <input type="range" id="priceMin" min="0" max="5000" step="100" value="0">
                            <input type="range" id="priceMax" min="0" max="5000" step="100" value="5000">
                            <div class="price-values">
                                <span>$<span id="minPrice">0</span></span>
                                <span>$<span id="maxPrice">5000</span></span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <h4>Duration</h4>
                        <label><input type="checkbox" value="1-3"> 1-3 days</label>
                        <label><input type="checkbox" value="4-7"> 4-7 days</label>
                        <label><input type="checkbox" value="8-14"> 8-14 days</label>
                        <label><input type="checkbox" value="15+"> 15+ days</label>
                    </div>
                    
                    <div class="filter-group">
                        <h4>Difficulty</h4>
                        <label><input type="checkbox" value="easy"> Easy</label>
                        <label><input type="checkbox" value="moderate"> Moderate</label>
                        <label><input type="checkbox" value="challenging"> Challenging</label>
                    </div>
                    
                    <button class="btn btn-primary" id="applyFilters">Apply Filters</button>
                    <button class="btn btn-outline" id="resetFilters">Reset</button>
                </aside>
                
                <!-- Tours Grid -->
                <div class="tours-content">
                    <div class="tours-header">
                        <p><span id="tourCount">8</span> tours found</p>
                        <select id="sortBy">
                            <option value="featured">Sort by: Featured</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="rating">Rating</option>
                            <option value="duration">Duration</option>
                        </select>
                    </div>
                    
                    <div class="tours-grid" id="allToursGrid">
                        <!-- Tours loaded by JavaScript -->
                    </div>
                    
                    <div class="pagination">
                        <button class="pagination-prev" disabled>← Previous</button>
                        <span class="pagination-info">Page 1 of 3</span>
                        <button class="pagination-next">Next →</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <!-- Same footer as index.html -->
    </footer>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/tours.js"></script>
</body>
</html>
